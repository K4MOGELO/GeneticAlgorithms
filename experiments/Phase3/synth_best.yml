run_name: "synth_best"
seed: null
out_dir: "./runs"

world:
  nx: 120
  ny: 150
  torus: true
  lifetime_ticks: 1500
  food: { name: "random_spots", n_spots: 600, per_spot: 1.0, p_regrow: 0.0005 }  # "slow"
  death: true
  energy: { E0: 6.0, Emax: 12.0, c_b: 0.02, c_m: 0.002, c_s: 0.0002, max_intake: 1.0 }

genome:
  fields:
    - { name: speed,   min: 0.0, max: 4.0,  sigma: 0.2 }
    - { name: vision,  min: 1.0, max: 10.0, sigma: 0.2 }
    - { name: curiosity, min: 0.0, max: 1.0, sigma: 0.1 }

ga:
  pop_size: 200
  generations: 50
  elitism: 2
  crossover:
    name: "uniform"
    rate: 0.7
  mutation:
    name: "gaussian"
    p: 0.02
    sigma: 0.05

  # Selection schedule: explore broadly early, exploit hard late
  selection_schedule:
    - { gen_from: 0,   gen_to: 10,  name: "random" }
    - { gen_from: 11,  gen_to: 25,  name: "roulette" }
    - { gen_from: 26,  gen_to: 50,  name: "tournament", k: 3 }

